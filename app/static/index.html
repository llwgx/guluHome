<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>温湿度监控</title>
  <script src="/static/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      overflow: hidden;
    }
    body.authenticated {
      background: url("/static/bg.jpg") center center / cover no-repeat fixed;
    }
    .layout.hidden { display: none; }
    .login-gate {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
    }
    .login-gate.hidden { display: none; }
    .login-box {
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 32px 36px;
      backdrop-filter: blur(8px);
      min-width: 280px;
      text-align: center;
    }
    .login-box h2 {
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: #f8fafc;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .login-box input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(15, 23, 42, 0.6);
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
    }
    .login-box input:focus {
      border-color: rgba(59, 130, 246, 0.6);
    }
    .login-box button {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: rgba(59, 130, 246, 0.75);
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .login-box button:hover { background: rgba(59, 130, 246, 0.9); }
    .login-error {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #fca5a5;
      min-height: 1.2em;
    }
    .layout {
      position: relative;
      z-index: 1;
      height: 100vh;
      padding: 20px;
    }
    .sidebar {
      position: absolute;
      left: 20px;
      top: 20px;
      bottom: 20px;
      width: min(300px, 26vw);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
      min-height: 0;
    }
    .card {
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 20px;
      backdrop-filter: blur(6px);
      position: relative;
      overflow: hidden;
      width: 100%;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .card.top::before { background: linear-gradient(90deg, #f97316, #fb923c); }
    .card.bottom::before { background: linear-gradient(90deg, #38bdf8, #22d3ee); }
    .card h2 {
      font-size: 1.15rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 2px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .card .device {
      font-size: 0.8rem;
      color: rgba(226, 232, 240, 0.65);
      margin-bottom: 14px;
    }
    .metrics { display: flex; gap: 16px; }
    .metric { flex: 1; }
    .metric .label { font-size: 0.8rem; color: rgba(226, 232, 240, 0.6); }
    .metric .value {
      font-size: 1.75rem;
      font-weight: 700;
      margin-top: 2px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }
    .metric.temp .value { color: #fdba74; }
    .metric.hum .value { color: #7dd3fc; }
    .metric .unit { font-size: 0.9rem; font-weight: 400; opacity: 0.8; }
    .updated { font-size: 0.7rem; color: rgba(226, 232, 240, 0.5); margin-top: 10px; }

    .charts-panel {
      position: absolute;
      right: 20px;
      top: 20px;
      bottom: 20px;
      width: 33.333vw;
      max-width: calc(100vw / 3);
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
      min-width: 0;
    }
    .charts-header {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      flex-shrink: 0;
    }
    .charts-header h1 {
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(248, 250, 252, 0.85);
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .toolbar { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .toolbar button {
      background: rgba(15, 23, 42, 0.4);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      backdrop-filter: blur(4px);
    }
    .toolbar button.active {
      background: rgba(59, 130, 246, 0.55);
      border-color: rgba(147, 197, 253, 0.5);
    }
    .charts-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }
    .chart-box {
      flex: 1;
      min-height: 0;
      background: rgba(15, 23, 42, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 14px 16px 10px;
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
    }
    .chart-box h3 {
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: rgba(248, 250, 252, 0.9);
      flex-shrink: 0;
    }
    .chart-box canvas {
      flex: 1;
      min-height: 0;
      max-height: 100%;
    }
    .status {
      text-align: right;
      color: rgba(226, 232, 240, 0.45);
      font-size: 0.7rem;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      html, body {
        height: auto;
        min-height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      body.authenticated {
        background-attachment: scroll;
      }
      .login-gate {
        padding: 16px;
        padding-top: max(16px, env(safe-area-inset-top));
        padding-bottom: max(16px, env(safe-area-inset-bottom));
      }
      .login-box {
        width: 100%;
        max-width: 360px;
        min-width: 0;
        padding: 24px 20px;
      }
      .login-box input {
        font-size: 16px;
        padding: 12px 14px;
      }
      .login-box button {
        padding: 12px;
        min-height: 44px;
      }
      .layout {
        height: auto;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 12px;
        padding-top: max(12px, env(safe-area-inset-top));
        padding-bottom: max(16px, env(safe-area-inset-bottom));
      }
      .sidebar {
        position: static;
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        justify-content: stretch;
      }
      .sidebar > div:empty {
        display: none;
      }
      .card {
        padding: 14px 12px;
      }
      .card h2 { font-size: 1rem; }
      .card .device {
        font-size: 0.72rem;
        margin-bottom: 10px;
      }
      .metrics { gap: 8px; }
      .metric .label { font-size: 0.72rem; }
      .metric .value { font-size: 1.35rem; }
      .metric .unit { font-size: 0.75rem; }
      .updated { font-size: 0.65rem; margin-top: 8px; }

      .charts-panel {
        position: static;
        width: 100%;
        max-width: 100%;
        min-height: 0;
        flex: 1;
      }
      .charts-header {
        gap: 10px;
      }
      .charts-header h1 {
        text-align: center;
        font-size: 1.05rem;
      }
      .toolbar {
        justify-content: stretch;
        gap: 8px;
      }
      .toolbar button {
        flex: 1;
        min-height: 40px;
        padding: 8px 6px;
        font-size: 0.78rem;
      }
      .charts-body {
        flex: none;
        gap: 10px;
      }
      .chart-box {
        flex: none;
        min-height: 200px;
        height: 200px;
        padding: 12px;
      }
      .chart-box canvas {
        min-height: 150px;
      }
      .status {
        text-align: center;
        padding-bottom: 4px;
      }
    }

    @media (max-width: 400px) {
      .sidebar {
        grid-template-columns: 1fr;
      }
      .metric .value { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="login-gate" id="login-gate">
    <div class="login-box">
      <h2>请输入访问密码</h2>
      <input type="password" id="login-password" placeholder="密码" autocomplete="off" />
      <button type="button" id="login-btn">进入</button>
      <p class="login-error" id="login-error"></p>
    </div>
  </div>

  <div class="layout hidden" id="app">
    <aside class="sidebar">
      <div id="card-top"></div>
      <div id="card-bottom"></div>
    </aside>

    <main class="charts-panel">
      <div class="charts-header">
        <h1>温湿度监控</h1>
        <div class="toolbar">
          <button class="active" data-period="today">当天</button>
          <button data-period="6">近 6 小时</button>
          <button data-period="24">近 24 小时</button>
        </div>
      </div>
      <div class="charts-body">
        <div class="chart-box">
          <h3 id="chart-title-1">顶部 趋势</h3>
          <canvas id="chart1"></canvas>
        </div>
        <div class="chart-box">
          <h3 id="chart-title-2">底部 趋势</h3>
          <canvas id="chart2"></canvas>
        </div>
      </div>
      <p class="status" id="status">加载中...</p>
    </main>
  </div>

  <script>
    const PAGE_PASSWORD = "gulu";
    const AUTH_KEY = "dashboard_auth";

    let refreshTimer = null;

    function startAutoRefresh() {
      if (refreshTimer) return;
      refreshTimer = setInterval(refresh, 30_000);
    }

    function unlockPage() {
      document.getElementById("login-gate").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      document.body.classList.add("authenticated");
      sessionStorage.setItem(AUTH_KEY, "1");
      refresh();
      startAutoRefresh();
    }

    function tryLogin() {
      const input = document.getElementById("login-password");
      const error = document.getElementById("login-error");
      if (input.value === PAGE_PASSWORD) {
        error.textContent = "";
        unlockPage();
      } else {
        error.textContent = "密码错误";
        input.value = "";
        input.focus();
      }
    }

    document.getElementById("login-btn").addEventListener("click", tryLogin);
    document.getElementById("login-password").addEventListener("keydown", e => {
      if (e.key === "Enter") tryLogin();
    });

    if (sessionStorage.getItem(AUTH_KEY) === "1") {
      document.getElementById("login-gate").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      document.body.classList.add("authenticated");
    }

    let chartPeriod = "today";
    const charts = {};
    const CARD_SLOTS = { 1: "card-top", 2: "card-bottom" };
    const isMobile = () => window.matchMedia("(max-width: 768px)").matches;

    function getChartDefaults() {
      const mobile = isMobile();
      return {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        scales: {
          x: {
            ticks: {
              maxTicksLimit: mobile ? 5 : 8,
              color: "rgba(226,232,240,0.55)",
              font: { size: mobile ? 9 : 10 },
              maxRotation: mobile ? 0 : 50,
            },
            grid: { color: "rgba(255,255,255,0.06)" },
          },
          y: {
            ticks: { color: "rgba(226,232,240,0.55)", font: { size: mobile ? 9 : 11 } },
            grid: { color: "rgba(255,255,255,0.06)" },
          },
        },
        plugins: {
          legend: {
            labels: {
              color: "rgba(226,232,240,0.75)",
              boxWidth: 10,
              font: { size: mobile ? 10 : 12 },
            },
          },
        },
      };
    }

    function formatTime(iso) {
      if (!iso) return "--";
      return new Date(iso).toLocaleString("zh-CN", {
        hour: "2-digit", minute: "2-digit", second: "2-digit",
      });
    }

    function formatLabels(labels) {
      return labels.map(l =>
        new Date(l).toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
      );
    }

    function renderCard(s) {
      return `
        <div class="card ${s.sensor_no === 1 ? "top" : "bottom"}">
          <h2>${s.label}</h2>
          ${s.device_name ? `<div class="device">${s.device_name}</div>` : ""}
          <div class="metrics">
            <div class="metric temp">
              <div class="label">温度</div>
              <div class="value">${s.temperature != null ? s.temperature.toFixed(1) : "--"}<span class="unit"> °C</span></div>
            </div>
            <div class="metric hum">
              <div class="label">湿度</div>
              <div class="value">${s.humidity != null ? s.humidity.toFixed(1) : "--"}<span class="unit"> %</span></div>
            </div>
          </div>
          <div class="updated">更新: ${formatTime(s.recorded_at)}</div>
        </div>`;
    }

    async function loadLatest() {
      const res = await fetch("/api/latest");
      if (!res.ok) throw new Error(`latest API ${res.status}`);
      const data = await res.json();
      for (const s of data.sensors) {
        const slot = document.getElementById(CARD_SLOTS[s.sensor_no]);
        if (slot) slot.innerHTML = renderCard(s);
      }
    }

    function chartQuery(sensorNo) {
      if (chartPeriod === "today") {
        return `/api/chart?sensor=${sensorNo}&today=true`;
      }
      return `/api/chart?sensor=${sensorNo}&hours=${chartPeriod}`;
    }

    function buildChart(canvasId, sensorNo, chartData) {
      const titleEl = document.getElementById(`chart-title-${sensorNo}`);
      if (titleEl) titleEl.textContent = `${chartData.label} 趋势`;

      const ctx = document.getElementById(canvasId).getContext("2d");
      if (charts[canvasId]) charts[canvasId].destroy();

      charts[canvasId] = new Chart(ctx, {
        type: "line",
        data: {
          labels: formatLabels(chartData.labels),
          datasets: [
            {
              label: "温度 (°C)",
              data: chartData.temperature,
              borderColor: "#fb923c",
              backgroundColor: "rgba(251,146,60,0.08)",
              tension: 0.3,
              spanGaps: true,
              borderWidth: isMobile() ? 1.5 : 2,
              pointRadius: 0,
            },
            {
              label: "湿度 (%)",
              data: chartData.humidity,
              borderColor: "#38bdf8",
              backgroundColor: "rgba(56,189,248,0.08)",
              tension: 0.3,
              spanGaps: true,
              yAxisID: "y1",
              borderWidth: isMobile() ? 1.5 : 2,
              pointRadius: 0,
            },
          ],
        },
        options: (() => {
          const chartDefaults = getChartDefaults();
          return {
            ...chartDefaults,
            scales: {
              ...chartDefaults.scales,
              y: {
                ...chartDefaults.scales.y,
                position: "left",
                title: { display: !isMobile(), text: "°C", color: "rgba(226,232,240,0.5)" },
              },
              y1: {
                position: "right",
                grid: { drawOnChartArea: false },
                ticks: { color: "rgba(226,232,240,0.55)", font: { size: isMobile() ? 9 : 11 } },
                title: { display: !isMobile(), text: "%", color: "rgba(226,232,240,0.5)" },
              },
            },
          };
        })(),
      });
    }

    async function loadCharts() {
      if (typeof Chart === "undefined") {
        throw new Error("Chart.js 未加载");
      }
      for (const sensorNo of [1, 2]) {
        const res = await fetch(chartQuery(sensorNo));
        if (!res.ok) throw new Error(`chart API ${res.status}`);
        const data = await res.json();
        buildChart(`chart${sensorNo}`, sensorNo, data);
      }
    }

    async function refresh() {
      const status = document.getElementById("status");
      let latestOk = false;
      let chartsOk = false;

      try {
        await loadLatest();
        latestOk = true;
      } catch {
        status.textContent = "读数加载失败，请检查服务是否运行";
      }

      try {
        await loadCharts();
        chartsOk = true;
      } catch {
        if (latestOk) {
          status.textContent = "读数已更新，图表加载失败";
        } else if (!status.textContent.includes("读数")) {
          status.textContent = "加载失败，请检查服务是否运行";
        }
      }

      if (latestOk && chartsOk) {
        status.textContent = `最后刷新: ${new Date().toLocaleString("zh-CN")}`;
      }
    }

    document.querySelectorAll(".toolbar button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".toolbar button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        chartPeriod = btn.dataset.period;
        loadCharts();
      });
    });

    if (sessionStorage.getItem(AUTH_KEY) === "1") {
      refresh();
      startAutoRefresh();
    }

    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (Object.keys(charts).length) {
          loadCharts();
        }
      }, 200);
    });
    window.addEventListener("orientationchange", () => {
      setTimeout(() => {
        Object.values(charts).forEach(c => c.resize());
      }, 300);
    });
  </script>
</body>
</html>
