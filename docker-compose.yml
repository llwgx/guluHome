services:
  db:
    image: postgres:16-alpine
    container_name: onenet-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_USER: onenet
      POSTGRES_PASSWORD: onenet_secret
      POSTGRES_DB: onenet_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 不映射 5432 到宿主机，避免与本地 PostgreSQL 冲突；app 通过内网 db:5432 访问
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onenet -d onenet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: onenet-receiver
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://onenet:onenet_secret@db:5432/onenet_db
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
